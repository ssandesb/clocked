name: Automate LinkedIn Post (Prompt-driven)

# Triggered by cron-job.org -> Composio -> workflow_dispatch (no GitHub schedule).
on:
  workflow_dispatch:

concurrency:
  group: linkedin-prompt-post
  cancel-in-progress: false

jobs:
  linkedin-prompt-post:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install composio

      - name: Run prompt-driven LinkedIn bot
        env:
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
          COMPOSIO_USER_ID: ${{ secrets.COMPOSIO_USER_ID }}
          COMPOSIO_LINKEDIN_CONNECTED_ACCOUNT_ID: ${{ secrets.COMPOSIO_LINKEDIN_CONNECTED_ACCOUNT_ID }}
          COMPOSIO_GMAIL_CONNECTED_ACCOUNT_ID: ${{ secrets.COMPOSIO_GMAIL_CONNECTED_ACCOUNT_ID }}
          COMPOSIO_GOOGLE_DRIVE_CONNECTED_ACCOUNT_ID: ${{ secrets.COMPOSIO_GOOGLE_DRIVE_CONNECTED_ACCOUNT_ID }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          PROMPT_DOC_NAME: prompt.docx
        run: python linkedin_prompt_bot.py
